<!DOCTYPE html>
<html>
<head>
	<title>BUXIN</title>
	<style type="text/css">
		body{
			background: linear-gradient(to bottom right, #9932cc, #6699ff);
			margin: 5px;
			font-size: 30px;
			text-align: center;
		}
		.button{
			display: inline-block;
			margin: 15px;
			padding: 10px;
			border-radius: 10px;
			border: 3px solid;
			color: white;
			font-size: 20px;
			cursor: pointer;
		}
		.button:hover{
			background-color: orange;
		}
		.button:active{
			background-color: #0066cc;
		}
		.button:first-child{
			background: linear-gradient(to bottom right, #00cc66, #0099cc);
		}
		.button:last-child{
			background: linear-gradient(to bottom right, #cc33ff, #9966ff);
		}
		.button a{
			color: white;
			text-decoration: none;
		}
		.button a:hover{
			color: orange;
		}
		.circle{
			display: inline-block;
			width: 30px;
			height: 30px;
			border-radius: 50%;
			border: 3px solid;
			cursor: pointer;
		}
		.circle:hover{
			background-color: orange;
		}
		.circle:active{
			background-color: #0066cc;
		}
		.circle img{
			width: 100%;
			height: 100%;
			border-radius: 50%;
		}
		.circle a{
			display: none;
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			color: white;
			font-size: 14px;
			text-decoration: none;
		}
		.circle:hover a{
			display: block;
		}
	</style>
</head>
